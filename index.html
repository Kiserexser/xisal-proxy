<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xisal Proxy | Реальный прокси</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            background: #0a0a0a;
            border-bottom: 2px solid #00ffcc;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .logo {
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffcc;
        }
        .url-input {
            flex: 1;
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid #00ffcc55;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-family: monospace;
        }
        .url-input:focus {
            outline: none;
            border-color: #00ffcc;
        }
        button {
            padding: 10px 20px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #00ccaa;
            transform: scale(1.02);
        }
        .new-window {
            background: #ff4444;
            color: white;
        }
        .status {
            color: #00ffccaa;
            font-size: 12px;
        }
        .content {
            flex: 1;
            position: relative;
            background: #ffffff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .quick-links {
            background: #0a0a0a;
            padding: 8px 20px;
            border-top: 1px solid #00ffcc33;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .quick-links a {
            color: #00ffcc;
            text-decoration: none;
            cursor: pointer;
        }
        .quick-links a:hover {
            text-decoration: underline;
        }
        .info {
            color: #666;
            font-size: 11px;
            margin-left: auto;
        }
        @media (max-width: 600px) {
            .top-bar { flex-direction: column; }
            .logo { text-align: center; }
            .quick-links { justify-content: center; }
            .info { margin-left: 0; text-align: center; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">⚡ XISAL PROXY</div>
    <input type="text" class="url-input" id="urlInput" placeholder="Введите URL (youtube.com, discord.com...)" value="https://youtube.com">
    <button onclick="goToUrl(false)">🌍 ОТКРЫТЬ</button>
    <button onclick="goToUrl(true)" class="new-window">🪟 НОВОЕ ОКНО (ПРОКСИ)</button>
    <div class="status" id="status">● готов</div>
</div>

<div class="content">
    <iframe id="proxyFrame" src="about:blank"></iframe>
</div>

<div class="quick-links">
    <a onclick="loadUrl('https://youtube.com')">▶ YouTube</a>
    <a onclick="loadUrl('https://discord.com/app')">🎮 Discord</a>
    <a onclick="loadUrl('https://web.telegram.org')">📱 Telegram</a>
    <a onclick="loadUrl('https://chat.openai.com')">🤖 ChatGPT</a>
    <a onclick="loadUrl('https://google.com')">🔍 Google</a>
    <span class="info">🌍 Реальный прокси-сервер • Обход блокировок</span>
</div>

<script>
    // ПРОКСИ-СЕРВЕР (бесплатный, не требует установки)
    const PROXY_URL = 'https://cors-anywhere.herokuapp.com/';
    
    async function loadUrl(url) {
        document.getElementById('urlInput').value = url;
        goToUrl(false);
    }
    
    async function goToUrl(newWindow = false) {
        let url = document.getElementById('urlInput').value.trim();
        if (!url) {
            updateStatus("⛔ Введите адрес", "#ff8888");
            return;
        }
        
        // Добавляем https:// если нет
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }
        
        const statusDiv = document.getElementById('status');
        updateStatus("🔄 загрузка через прокси...", "#ffaa00");
        
        if (newWindow) {
            // Открываем через прокси в новом окне
            const proxyUrl = PROXY_URL + url;
            window.open(proxyUrl, '_blank');
            updateStatus("● открыто в новом окне через прокси", "#00ffccaa");
        } else {
            // Загружаем в iframe
            const iframe = document.getElementById('proxyFrame');
            iframe.src = PROXY_URL + url;
            setTimeout(() => {
                updateStatus("● загружается через прокси", "#00ffccaa");
            }, 500);
        }
        
        saveToHistory(url);
    }
    
    function updateStatus(text, color) {
        const el = document.getElementById('status');
        el.innerHTML = text;
        el.style.color = color;
    }
    
    function saveToHistory(url) {
        let history = localStorage.getItem('proxy_history');
        if (history) {
            history = JSON.parse(history);
            history = history.filter(item => item !== url);
            history.unshift(url);
            if (history.length > 10) history.pop();
        } else {
            history = [url];
        }
        localStorage.setItem('proxy_history', JSON.stringify(history));
    }
    
    function loadLastUrl() {
        const history = localStorage.getItem('proxy_history');
        if (history) {
            const urls = JSON.parse(history);
            if (urls.length > 0) {
                document.getElementById('urlInput').value = urls[0];
            }
        }
    }
    
    document.getElementById('urlInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') goToUrl(false);
    });
    
    loadLastUrl();
</script>
</body>
</html>
