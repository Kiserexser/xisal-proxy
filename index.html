<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xisal AI | Нейросеть в браузере</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Segoe UI', system-ui, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: #0a0a0a;
            border: 1px solid #00ffcc;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
        }

        .header {
            background: #050505;
            padding: 16px 20px;
            border-bottom: 1px solid #00ffcc33;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            color: #00ffcc;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffcc;
        }

        .status {
            color: #00ffcc88;
            font-size: 11px;
            font-family: monospace;
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .model-info {
            color: #888;
            font-size: 10px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            max-width: 85%;
        }

        .user-message {
            align-self: flex-end;
        }

        .bot-message {
            align-self: flex-start;
        }

        .message-content {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .user-message .message-content {
            background: #00ffcc;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .bot-message .message-content {
            background: #1a1a1a;
            border: 1px solid #00ffcc55;
            color: #00ffcc;
            border-bottom-left-radius: 4px;
        }

        .typing {
            opacity: 0.7;
            font-style: italic;
        }

        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #00ffcc33;
            display: flex;
            gap: 10px;
            background: #050505;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            background: #1a1a1a;
            border: 1px solid #00ffcc55;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #00ffcc;
        }

        .input-area button {
            padding: 12px 24px;
            background: #00ffcc;
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:hover {
            background: #00ccaa;
            transform: scale(1.02);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #00ffcc;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ffcc;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">⚡ XISAL AI</div>
        <div class="model-info" id="modelInfo">⏳ загрузка модели...</div>
        <div class="status" id="status">● инициализация</div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message bot-message">
            <div class="message-content">
                ⚡ Привет! Я Xisal AI — нейросеть, работающая прямо в твоём браузере.<br>
                Модель загружается один раз, после чего я отвечаю оффлайн.<br><br>
                📌 Напиши что-нибудь...
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Спроси меня о чём угодно..." disabled>
        <button id="sendBtn" onclick="sendMessage()" disabled>ОТПРАВИТЬ</button>
    </div>
</div>

<!-- Подключаем Transformers.js (работает без API, чисто в браузере) -->
<script type="importmap">
    {
        "imports": {
            "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.0/dist/transformers.min.js"
        }
    }
</script>

<script type="module">
    import { pipeline, env } from '@xenova/transformers';
    
    // Настройка (можно убрать, оставлено для совместимости)
    env.allowLocalModels = true;
    env.useBrowserCache = true;
    
    let generator = null;
    let isReady = false;
    
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    const modelInfoDiv = document.getElementById('modelInfo');
    
    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        messageDiv.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
        chatArea.appendChild(messageDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return messageDiv;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function setTyping(show) {
        const typingMsg = document.getElementById('typing-indicator');
        if (show) {
            if (!typingMsg) {
                const div = document.createElement('div');
                div.id = 'typing-indicator';
                div.className = 'message bot-message';
                div.innerHTML = `<div class="message-content typing"><span class="loader"></span> Xisal AI печатает...</div>`;
                chatArea.appendChild(div);
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        } else {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }
    }
    
    async function sendMessage() {
        if (!isReady) {
            addMessage("⚠️ Нейросеть ещё не загрузилась. Подожди немного...", false);
            return;
        }
        
        const text = userInput.value.trim();
        if (!text) return;
        
        // Добавляем сообщение пользователя
        addMessage(text, true);
        userInput.value = '';
        
        // Отключаем ввод на время генерации
        userInput.disabled = true;
        sendBtn.disabled = true;
        
        setTyping(true);
        
        try {
            // Генерируем ответ нейросетью
            const result = await generator(text, {
                max_new_tokens: 512,
                temperature: 0.7,
                top_p: 0.9,
                do_sample: true,
            });
            
            const reply = result[0]?.generated_text || "Извини, не смог сгенерировать ответ.";
            
            setTyping(false);
            addMessage(reply, false);
            
        } catch (error) {
            setTyping(false);
            addMessage(`❌ Ошибка: ${error.message}`, false);
            console.error(error);
        }
        
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
    }
    
    // Загружаем модель (легковесная, ~300-400MB, загружается один раз)
    async function loadModel() {
        statusDiv.innerHTML = '● загрузка модели (300MB)...';
        modelInfoDiv.innerHTML = '📥 скачивание Xisal-Mini...';
        
        try {
            // Используем лёгкую модель, которая работает в браузере
            generator = await pipeline('text-generation', 'Xenova/tiny-llama-1.1b-chat-v0.4', {
                progress_callback: (progress) => {
                    if (progress.progress) {
                        const percent = Math.round(progress.progress * 100);
                        modelInfoDiv.innerHTML = `📥 загрузка: ${percent}%`;
                        statusDiv.innerHTML = `● ${percent}%`;
                    }
                }
            });
            
            isReady = true;
            statusDiv.innerHTML = '● активен (оффлайн)';
            modelInfoDiv.innerHTML = '🧠 TinyLlama 1.1B • работает локально';
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
            
            addMessage("✅ Нейросеть загружена! Теперь я отвечаю прямо в твоём браузере, без интернета и API. Задавай вопросы.", false);
            
        } catch (error) {
            statusDiv.innerHTML = '● ошибка';
            modelInfoDiv.innerHTML = '❌ не удалось загрузить модель';
            addMessage(`❌ Ошибка загрузки нейросети: ${error.message}\n\nПроверь соединение и перезагрузи страницу.`, false);
            console.error(error);
        }
    }
    
    // Обработка Enter
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && isReady && !sendBtn.disabled) {
            sendMessage();
        }
    });
    
    // Запускаем загрузку модели
    loadModel();
</script>
</body>
</html>
