<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Xisal Proxy | Реальный VPN на GitHub</title>
    <style>
        body {
            background: #000;
            color: #00ffcc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        input {
            background: #1a1a1a;
            border: 1px solid #00ffcc;
            color: white;
            padding: 10px;
            width: 300px;
            margin: 10px;
        }
        button {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        a {
            color: #00ffcc;
            display: block;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ XISAL PROXY (РАБОТАЕТ)</h1>
        <input type="text" id="urlInput" placeholder="youtube.com" value="youtube.com">
        <button onclick="openProxy()">🛡️ ОТКРЫТЬ ЧЕРЕЗ VPN (НОВОЕ ОКНО)</button>
        <div style="margin-top: 30px;">
            <a onclick="setUrl('youtube.com')">▶ YouTube</a>
            <a onclick="setUrl('google.com')">🔍 Google</a>
            <a onclick="setUrl('discord.com/app')">🎮 Discord</a>
        </div>
        <div id="status" style="margin-top: 20px; font-size: 12px; color: #888;">● Готов</div>
    </div>

    <script>
        // ВСТАВЬ СЮДА СВОЙ URL ОТ CLOUDFLARE WORKERS
        const WORKER_URL = 'https://ТВОЙ-WORKER.workers.dev/proxy?url=';
        
        function setUrl(url) {
            document.getElementById('urlInput').value = url;
            openProxy();
        }
        
        async function openProxy() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            
            if (!url.startsWith('http')) url = 'https://' + url;
            
            const status = document.getElementById('status');
            status.innerHTML = '🔄 Соединение через VPN...';
            status.style.color = '#ffaa00';
            
            try {
                const proxyFullUrl = WORKER_URL + encodeURIComponent(url);
                window.open(proxyFullUrl, '_blank');
                status.innerHTML = '✅ Открыто через Cloudflare VPN (IP изменён)';
                status.style.color = '#00ffaa';
            } catch(e) {
                status.innerHTML = '❌ Ошибка: ' + e.message;
                status.style.color = '#ff4444';
            }
        }
    </script>
</body>
</html>
