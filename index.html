<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xisal AI | Нейросеть без скачивания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Segoe UI', system-ui, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: #0a0a0a;
            border: 1px solid #00ffcc;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
        }

        .header {
            background: #050505;
            padding: 16px 20px;
            border-bottom: 1px solid #00ffcc33;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #00ffcc;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffcc;
        }

        .status {
            color: #00ffcc88;
            font-size: 11px;
            font-family: monospace;
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            max-width: 85%;
        }

        .user-message {
            align-self: flex-end;
        }

        .bot-message {
            align-self: flex-start;
        }

        .message-content {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .user-message .message-content {
            background: #00ffcc;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .bot-message .message-content {
            background: #1a1a1a;
            border: 1px solid #00ffcc55;
            color: #00ffcc;
            border-bottom-left-radius: 4px;
        }

        .typing {
            opacity: 0.7;
        }

        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #00ffcc33;
            display: flex;
            gap: 10px;
            background: #050505;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            background: #1a1a1a;
            border: 1px solid #00ffcc55;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #00ffcc;
        }

        .input-area button {
            padding: 12px 24px;
            background: #00ffcc;
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:hover {
            background: #00ccaa;
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            text-align: center;
            font-size: 10px;
            color: #444;
            padding: 8px;
            border-top: 1px solid #00ffcc33;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ffcc;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">⚡ XISAL AI</div>
        <div class="status" id="status">● готов</div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message bot-message">
            <div class="message-content">
                ⚡ Привет! Я Xisal AI — нейросеть Gemini.<br>
                Ничего не скачивается, работает мгновенно.<br><br>
                📌 Напиши что-нибудь...
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Спроси меня о чём угодно...">
        <button id="sendBtn" onclick="sendMessage()">ОТПРАВИТЬ</button>
    </div>
    <div class="info">
        🔐 Работает через Google Gemini API • Бесплатно • Ничего не скачивается
    </div>
</div>

<script>
    // =============================================
    // ТВОЙ API КЛЮЧ УЖЕ ВСТАВЛЕН
    const GEMINI_API_KEY = 'AIzaSyCEesCte8DY0A3B0WBrhpc3-ebAf_N1gNg';
    // =============================================
    
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    // История диалога
    let history = [];
    
    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        messageDiv.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
        chatArea.appendChild(messageDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return messageDiv;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function setTyping(show) {
        const typingMsg = document.getElementById('typing-indicator');
        if (show) {
            if (!typingMsg) {
                const div = document.createElement('div');
                div.id = 'typing-indicator';
                div.className = 'message bot-message';
                div.innerHTML = `<div class="message-content typing">⚡ Xisal AI печатает...</div>`;
                chatArea.appendChild(div);
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        } else {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }
    }
    
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        
        // Добавляем сообщение пользователя
        addMessage(text, true);
        userInput.value = '';
        
        // Отключаем ввод
        userInput.disabled = true;
        sendBtn.disabled = true;
        statusDiv.innerHTML = '● думаю...';
        
        setTyping(true);
        
        try {
            // Добавляем в историю
            history.push({ role: "user", parts: [{ text: text }] });
            
            // Запрос к Google Gemini API
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    contents: history,
                    generationConfig: {
                        temperature: 0.9,
                        maxOutputTokens: 2048,
                    }
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || `Ошибка ${response.status}`);
            }
            
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            
            // Добавляем ответ в историю
            history.push({ role: "model", parts: [{ text: reply }] });
            
            setTyping(false);
            addMessage(reply, false);
            statusDiv.innerHTML = '● готов';
            
        } catch (error) {
            setTyping(false);
            addMessage(`❌ Ошибка: ${error.message}\n\nПроверь интернет или API ключ.`, false);
            statusDiv.innerHTML = '● ошибка';
            console.error(error);
        }
        
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
    }
    
    // Обработка Enter
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>
</body>
</html>
