<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Xisal Proxy | YouTube автоматом</title>
    <style>
        body {
            background: #000;
            color: #00ffcc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ XISAL PROXY</h1>
        <div class="status" id="status">🔄 Запуск YouTube через прокси...</div>
    </div>

    <script>
        // Рабочие прокси (без кнопок подтверждения)
        const PROXIES = [
            'https://croxyproxy.net/',
            'https://hide.me/en/proxy',
            'https://4everproxy.com/'
        ];
        
        // Берём случайный прокси
        const randomProxy = PROXIES[Math.floor(Math.random() * PROXIES.length)];
        
        // Открываем YouTube через прокси в новой вкладке
        window.onload = function() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '🚀 Открываю YouTube через ' + randomProxy + '...';
            
            // Открываем YouTube через выбранный прокси
            setTimeout(() => {
                window.open(randomProxy, '_blank');
                statusDiv.innerHTML = '✅ Если YouTube не открылся — нажми на кнопку "YouTube" на открывшейся вкладке';
            }, 500);
        };
    </script>
</body>
</html>
