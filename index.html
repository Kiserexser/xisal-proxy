<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xisal Proxy | Google + VPN через прокси</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            background: #0a0a0a;
            border-bottom: 2px solid #00ffcc;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .logo {
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffcc;
        }
        .url-input {
            flex: 1;
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid #00ffcc55;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-family: monospace;
        }
        .url-input:focus {
            outline: none;
            border-color: #00ffcc;
        }
        button {
            padding: 10px 20px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #00ccaa;
            transform: scale(1.02);
        }
        .vpn-mode {
            background: #ff4444;
            color: white;
        }
        .vpn-mode-active {
            background: #00cc44;
            color: white;
        }
        .status {
            color: #00ffccaa;
            font-size: 12px;
        }
        .content {
            flex: 1;
            position: relative;
            background: #ffffff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .quick-links {
            background: #0a0a0a;
            padding: 8px 20px;
            border-top: 1px solid #00ffcc33;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .quick-links a {
            color: #00ffcc;
            text-decoration: none;
            cursor: pointer;
        }
        .quick-links a:hover {
            text-decoration: underline;
        }
        .proxy-select {
            background: #1a1a1a;
            color: #00ffcc;
            border: 1px solid #00ffcc55;
            border-radius: 6px;
            padding: 4px 8px;
            font-family: monospace;
            margin-left: 10px;
        }
        .info {
            color: #666;
            font-size: 11px;
            margin-left: auto;
        }
        @media (max-width: 600px) {
            .top-bar { flex-direction: column; }
            .logo { text-align: center; }
            .quick-links { justify-content: center; flex-direction: column; align-items: stretch; }
            .info { margin-left: 0; text-align: center; }
            .proxy-select { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">⚡ XISAL PROXY + VPN</div>
    <input type="text" class="url-input" id="urlInput" placeholder="Введите URL" value="https://google.com">
    <button onclick="goToUrl(false)">🌍 ОТКРЫТЬ</button>
    <button onclick="goToUrl(true)" class="vpn-mode" id="vpnBtn">🛡️ VPN РЕЖИМ (новое окно)</button>
    <div class="status" id="status">● готов</div>
</div>

<div class="quick-links">
    <a onclick="loadUrl('https://google.com')">🔍 Google</a>
    <a onclick="loadUrl('https://youtube.com')">▶ YouTube</a>
    <a onclick="loadUrl('https://discord.com/app')">🎮 Discord</a>
    <a onclick="loadUrl('https://web.telegram.org')">📱 Telegram</a>
    <a onclick="loadUrl('https://chat.openai.com')">🤖 ChatGPT</a>
    <select id="proxySelect" class="proxy-select">
        <option value="https://cors-anywhere.herokuapp.com/">🟢 Прокси 1 (cors-anywhere)</option>
        <option value="https://api.allorigins.win/get?url=">🟡 Прокси 2 (allorigins)</option>
        <option value="https://proxy.cors.sh/">🔵 Прокси 3 (cors.sh)</option>
        <option value="https://corsproxy.io/">🟣 Прокси 4 (corsproxy.io)</option>
    </select>
    <span class="info">🌍 Выбери прокси → нажми VPN РЕЖИМ → сайт откроется с другим IP</span>
</div>

<div class="content">
    <iframe id="proxyFrame" src="about:blank"></iframe>
</div>

<script>
    let currentProxy = document.getElementById('proxySelect').value;
    
    document.getElementById('proxySelect').addEventListener('change', function() {
        currentProxy = this.value;
        updateStatus("● прокси изменён", "#00ffccaa");
    });
    
    async function loadUrl(url) {
        document.getElementById('urlInput').value = url;
        goToUrl(false);
    }
    
    async function goToUrl(newWindow = false) {
        let url = document.getElementById('urlInput').value.trim();
        if (!url) {
            updateStatus("⛔ Введите адрес", "#ff8888");
            return;
        }
        
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }
        
        const vpnBtn = document.getElementById('vpnBtn');
        
        if (newWindow) {
            // VPN РЕЖИМ: открываем через выбранный прокси в новом окне
            updateStatus("🛡️ VPN режим: открываю через прокси...", "#ffaa00");
            vpnBtn.textContent = '🛡️ VPN АКТИВЕН...';
            vpnBtn.style.background = '#00cc44';
            
            let proxyUrl;
            if (currentProxy.includes('allorigins')) {
                // allorigins требует специального формата
                proxyUrl = currentProxy + encodeURIComponent(url);
            } else if (currentProxy.includes('cors.sh')) {
                proxyUrl = currentProxy + url;
            } else {
                proxyUrl = currentProxy + url;
            }
            
            window.open(proxyUrl, '_blank');
            
            setTimeout(() => {
                vpnBtn.textContent = '🛡️ VPN РЕЖИМ (новое окно)';
                vpnBtn.style.background = '#ff4444';
                updateStatus("● открыто с новым IP", "#00ffccaa");
            }, 1500);
        } else {
            // Обычный режим: в iframe
            updateStatus("🔄 загрузка...", "#ffaa00");
            const iframe = document.getElementById('proxyFrame');
            
            if (currentProxy.includes('allorigins')) {
                // allorigins возвращает JSON, нужно извлечь содержимое
                updateStatus("⚠️ Прокси 2 не подходит для iframe, используй VPN РЕЖИМ", "#ff8888");
                return;
            }
            
            iframe.src = currentProxy + url;
            setTimeout(() => updateStatus("● загружается", "#00ffccaa"), 500);
        }
        
        saveToHistory(url);
    }
    
    function updateStatus(text, color) {
        const el = document.getElementById('status');
        el.innerHTML = text;
        el.style.color = color;
    }
    
    function saveToHistory(url) {
        let history = localStorage.getItem('proxy_history');
        if (history) {
            history = JSON.parse(history);
            history = history.filter(item => item !== url);
            history.unshift(url);
            if (history.length > 10) history.pop();
        } else {
            history = [url];
        }
        localStorage.setItem('proxy_history', JSON.stringify(history));
    }
    
    function loadLastUrl() {
        const history = localStorage.getItem('proxy_history');
        if (history) {
            const urls = JSON.parse(history);
            if (urls.length > 0 && urls[0] !== 'https://google.com') {
                document.getElementById('urlInput').value = urls[0];
            }
        }
    }
    
    document.getElementById('urlInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') goToUrl(true);
    });
    
    loadLastUrl();
</script>
</body>
</html>
